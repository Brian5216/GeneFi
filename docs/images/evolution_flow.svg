<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" rx="12" fill="#0f172a"/>
  <text x="400" y="28" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="16" font-weight="bold">Evolution Flow 进化流程</text>

  <!-- Steps -->
  <rect x="20" y="50" width="130" height="80" rx="10" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="45" cy="68" r="12" fill="#06b6d4"/>
  <text x="45" y="73" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="12" font-weight="bold">1</text>
  <text x="85" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="12" font-weight="bold">检测</text>
  <text x="85" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="10">Detect</text>
  <text x="85" y="106" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">Market Regime</text>
  <text x="85" y="120" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">8 种体制</text>

  <text x="165" y="90" fill="#10b981" font-family="Arial" font-size="22">→</text>

  <rect x="180" y="50" width="130" height="80" rx="10" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="205" cy="68" r="12" fill="#8b5cf6"/>
  <text x="205" y="73" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">2</text>
  <text x="245" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="12" font-weight="bold">生成</text>
  <text x="245" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="10">Generate</text>
  <text x="245" y="106" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">Strategy Pop</text>
  <text x="245" y="120" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">20 个体</text>

  <text x="325" y="90" fill="#10b981" font-family="Arial" font-size="22">→</text>

  <rect x="340" y="50" width="130" height="80" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="365" cy="68" r="12" fill="#f59e0b"/>
  <text x="365" y="73" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="12" font-weight="bold">3</text>
  <text x="405" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="12" font-weight="bold">回测</text>
  <text x="405" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="10">Backtest</text>
  <text x="405" y="106" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">OKX K-line</text>
  <text x="405" y="120" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">滚动窗口</text>

  <text x="485" y="90" fill="#10b981" font-family="Arial" font-size="22">→</text>

  <rect x="500" y="50" width="130" height="80" rx="10" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="525" cy="68" r="12" fill="#10b981"/>
  <text x="525" y="73" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="12" font-weight="bold">4</text>
  <text x="565" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="12" font-weight="bold">评分</text>
  <text x="565" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="10">Score</text>
  <text x="565" y="106" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">Fitness Fn</text>
  <text x="565" y="120" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">排名淘汰</text>

  <text x="645" y="90" fill="#10b981" font-family="Arial" font-size="22">→</text>

  <rect x="660" y="50" width="120" height="80" rx="10" fill="#4c0519" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="685" cy="68" r="12" fill="#ef4444"/>
  <text x="685" y="73" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">5</text>
  <text x="720" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="12" font-weight="bold">进化</text>
  <text x="720" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="10">Evolve</text>
  <text x="720" y="106" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">Mutate +</text>
  <text x="720" y="120" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="9">Crossover</text>

  <!-- Loop arrow -->
  <path d="M720 135 L720 165 L85 165 L85 135" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="400" y="180" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="11" font-weight="bold">Next Generation ↺</text>

  <!-- Fitness formula -->
  <text x="400" y="196" text-anchor="middle" fill="#475569" font-family="Arial" font-size="10">Score = 0.5 × PnL + 0.3 × FundingYield × 50 − 0.2 × MaxDrawdown</text>
</svg>
