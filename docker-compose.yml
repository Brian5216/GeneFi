version: "3.8"

services:
  genefi:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=true
      - EXECUTION_MODE=simulation
      - EVOLUTION_POPULATION_SIZE=20
      - EVOLUTION_GENERATIONS=15
      - MUTATION_RATE=0.15
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
